    <style>
        /* BASE & NAV */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff; color: #1a1a1a; }
        
        nav { 
            padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: white; z-index: 1000;
        }
        nav .logo { font-weight: bold; letter-spacing: 2px; }
        nav .menu a { text-decoration: none; color: #666; margin-left: 25px; font-size: 0.85rem; text-transform: uppercase; transition: 0.3s; }
        nav .menu a:hover { color: #238636; }

        /* HEADER SECTION */
        .page-header { padding: 80px 20px; text-align: center; background: #fdfdfd; }
        .page-header h1 { font-size: 2.5rem; font-weight: 300; margin-bottom: 15px; }
        .page-header p { color: #888; max-width: 600px; margin: 0 auto; font-style: italic; }

        /* GRID DE PROYECTOS */
        .portfolio-container {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;
        }

        .project-card {
            background: #fff; border-radius: 4px; overflow: hidden;
            border: 1px solid #eee; transition: all 0.4s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border-color: #238636;
        }

        .project-image {
            width: 100%; height: 200px; background: #f5f5f5;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: #ddd;
        }

        .project-info { padding: 25px; }
        .project-info h3 { font-size: 1.2rem; margin-bottom: 10px; color: #333; }
        .project-info p { font-size: 0.9rem; color: #777; margin-bottom: 20px; }
        
        .tag {
            display: inline-block; background: #f0f0f0; color: #555;
            padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; margin-right: 5px;
        }

        /* FOOTER */
        footer { padding: 60px; text-align: center; border-top: 1px solid #f0f0f0; color: #bbb; font-size: 0.8rem; }
    </style>
</head>
