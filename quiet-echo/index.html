<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día 1 // quiet-echo</title>
    
    <link rel="stylesheet" href="../assets/style.css">

    <style>
        /* ==========================================
           CONFIGURACIÓN DE COLORES Y VARIABLES
           ========================================== */
        :root {
            --bg-color: #08080c;       
            --text-main: #f0f0f5;      
            --text-muted: #66667e;     
            --accent-glow: rgba(168, 85, 247, 0.4); 
            --font-family: 'Courier New', Courier, monospace; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4;
        }

        /* ==========================================
           ESTRUCTURA DE TRANSICIONES NARRATIVAS
           ========================================== */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            animation: fadeInScreen 3.5s ease-out forwards;
        }

        .fade-step {
            transition: opacity 1.5s ease-in-out, transform 1.5s ease-in-out;
            opacity: 1;
            transform: translateY(0);
        }

        .fade-step.hidden {
            opacity: 0;
            transform: translateY(-15px);
            pointer-events: none;
            position: absolute;
            width: 100%;
            left: 0;
        }

        .fade-step.init-hidden {
            opacity: 0;
            transform: translateY(15px);
            pointer-events: none;
        }

        .fade-step.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .narrative-text {
            font-size: 1.1rem;
            color: var(--text-main);
            line-height: 1.8;
            letter-spacing: 0.15em;
            margin-bottom: 45px;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(240, 240, 245, 0.3);
        }

        /* Contenedores de imágenes (listas para usar ../assets/images/) */
        .narrative-image {
            max-width: 100%;
            height: auto;
            margin-bottom: 30px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .interaction-box {
            margin-top: 30px;
        }

        .question-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            display: block;
            margin-bottom: 25px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .custom-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--text-muted);
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 1rem;
            padding: 8px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            outline: none;
            letter-spacing: 0.1em;
            transition: border-color 0.5s, box-shadow 0.5s;
            user-select: text;
            -webkit-user-select: text;
        }

        .custom-input:focus {
            border-bottom: 1px solid var(--text-main);
            box-shadow: 0 1px 10px rgba(240, 240, 245, 0.1);
        }

        .submit-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            font-family: var(--font-family);
            font-size: 0.75rem;
            padding: 10px 24px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.6s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            border-color: var(--text-main);
            color: var(--text-main);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .countdown-box {
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .countdown-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-bottom: 15px;
            display: block;
        }

        .timer {
            font-size: 1.8rem;
            color: var(--text-main);
            letter-spacing: 0.2em;
            font-weight: bold;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .symbol-container {
            position: absolute;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
        }

        .symbol {
            font-size: 1.2rem;
            color: var(--text-muted);
            animation: pulseSignal 3s infinite ease-in-out;
            text-shadow: 0 0 8px var(--accent-glow);
        }

        @keyframes fadeInScreen {
            0% { opacity: 0; transform: scale(0.99); filter: blur(3px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes pulseSignal {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.9; color: var(--text-main); }
            100% { transform: scale(1); opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .narrative-text { font-size: 0.95rem; padding: 0 15px; }
            .timer { font-size: 1.5rem; }
            .custom-input { width: 90%; }
        }
    </style>
</head>
<body>

    <canvas id="ambientCanvas"></canvas>

    <div class="container">
        
        <div id="step-interaction" class="fade-step">
            <p class="narrative-text">
                Hay lugares que desaparecen.<br>
                Y otros que siguen existiendo aunque nadie los mire.
            </p>

            <div class="interaction-box">
                <span class="question-label">¿Recuerdas dónde fue nuestra primera cita ?</span>
                <div class="input-wrapper">
                    <input type="text" id="answerInput" class="custom-input" placeholder="..." autocomplete="off" spellcheck="false">
                    <button id="submitBtn" class="submit-btn">Enviar</button>
                </div>
            </div>
        </div>

        <div id="step-countdown" class="fade-step init-hidden hidden">
            <p class="narrative-text">
                Correcto.<br>
                Aunque no fue ahí donde empezó lo importante.
            </p>

            <div class="countdown-box">
                <span class="countdown-label">Siguente señal en:</span>
                <div id="countdown" class="timer">24:00:00</div>
            </div>
        </div>
        
        <span class="dedication">Para Blanca Almohalla</span>
        
        <span class="creator">señal creada por johnsalchichon</span>

        <div class="symbol-container">
            <div class="symbol">❤</div>
        </div>
    </div>
        <div class="symbol-container">
            <div class="symbol">◉</div>
        </div>
    </div>

    <script>
        /* ==========================================
           LÓGICA INTERACTIVA Y RESPUESTA
           ========================================== */
        const COUNTDOWN_DURATION = 24 * 60 * 60 * 1000; 

        const stepInteraction = document.getElementById('step-interaction');
        const stepCountdown = document.getElementById('step-countdown');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const timerElement = document.getElementById('countdown');

        let startTime = localStorage.getItem('dia1_start_time');

        if (startTime) {
            showCountdownLayout();
            startTimer(startTime);
        } else {
            submitBtn.addEventListener('click', processAnswer);
            answerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') processAnswer();
            });
        }

        function processAnswer() {
            if (answerInput.value.trim() === "") return; 

            const now = new Date().getTime();
            localStorage.setItem('dia1_start_time', now);

            stepInteraction.classList.add('hidden');
            
            setTimeout(() => {
                stepInteraction.style.display = 'none';
                showCountdownLayout();
                startTimer(now);
            }, 1500);
        }

        function showCountdownLayout() {
            stepInteraction.style.display = 'none';
            stepCountdown.classList.remove('hidden', 'init-hidden');
            stepCountdown.classList.add('visible');
        }

        function startTimer(time) {
            const targetTime = parseInt(time, 10) + COUNTDOWN_DURATION;

            function updateTimer() {
                const currentNow = new Date().getTime();
                const distance = targetTime - currentNow;

                if (distance <= 0) {
                    clearInterval(intervalId);
                    timerElement.innerHTML = "00:00:00";
                    timerElement.style.color = "var(--text-muted)";
                    return;
                }

                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                const formattedHours = String(hours).padStart(2, '0');
                const formattedMinutes = String(minutes).padStart(2, '0');
                const formattedSeconds = String(seconds).padStart(2, '0');

                timerElement.innerHTML = `${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
            }

            updateTimer();
            const intervalId = setInterval(updateTimer, 1000);
        }

        /* ==========================================
           POLVO ATMOSFÉRICO (CANVAS)
           ========================================== */
        function initAmbientParticles() {
            const canvas = document.getElementById('ambientCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const particleCount = 40; 
            for(let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2 + 0.3,
                    speedY: -(Math.random() * 0.2 + 0.05),
                    opacity: Math.random() * 0.5 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(240, 240, 245, ${p.opacity})`;
                    ctx.fill();

                    p.y += p.speedY;
                    if (p.y < 0) {
                        p.y = canvas.height;
                        p.x = Math.random() * canvas.width;
                    }
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = () => {
            initAmbientParticles();
        };
    </script>

    <script src="../assets/countdown.js"></script>
    <script src="../assets/glow.js"></script>
</body>
</html>
