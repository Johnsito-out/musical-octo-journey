
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL // LOVE</title>
    
    <link rel="stylesheet" href="../assets/style.css">

    <style>
        /* ==========================================
           CONFIGURACIÓN DE COLORES Y VARIABLES
           ========================================== */
        :root {
            --bg-color: #050508;       /* Un tono más profundo */
            --text-main: #f0f0f5;      
            --text-muted: #55556e;     
            --heart-color: #ff3344;    
            --accent-glow: rgba(255, 51, 68, 0.4); 
            --font-family: 'Courier New', Courier, monospace; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Lienzo único para optimizar el rendimiento de las partículas */
        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ==========================================
           CONTENEDOR CENTRAL (TEXTO E INTERFAZ)
           ========================================== */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            pointer-events: none; /* Permite que los clicks pasen al fondo si deseas añadir interactividad */
        }

        /* Espaciador dinámico para el corazón matemático */
        .heart-spacer {
            height: 260px; 
            width: 100%;
        }

        .love-message {
            font-size: 2.4rem;
            color: var(--text-main);
            letter-spacing: 0.3em;
            font-weight: 300;
            margin-top: 20px;
            margin-bottom: 40px;
            text-transform: lowercase;
            text-shadow: 0 0 15px rgba(240, 240, 245, 0.3), 0 0 30px var(--accent-glow);
            animation: pulseText 2.8s infinite ease-in-out;
            opacity: 0;
            animation: fadeInText 4s ease-out 1s forwards, pulseText 2.8s infinite ease-in-out 5s;
        }

        /* PIE DE PÁGINA / CRÉDITOS */
        .footer-credits {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            opacity: 0;
            animation: fadeInText 3s ease-out 2s forwards;
        }

        .creator {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            display: block;
            margin-bottom: 8px;
        }

        .metadata {
            font-size: 0.6rem;
            color: #252535;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ==========================================
           ANIMACIONES
           ========================================== */
        @keyframes fadeInText {
            0% { opacity: 0; filter: blur(3px); }
            100% { opacity: 1; filter: blur(0); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); text-shadow: 0 0 20px rgba(240, 240, 245, 0.5), 0 0 40px var(--heart-color); }
        }

        @media (max-width: 768px) {
            .love-message {
                font-size: 1.8rem;
                letter-spacing: 0.2em;
            }
            .heart-spacer {
                height: 200px;
            }
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="container">
        
        <div class="heart-spacer"></div>

        <h1 class="love-message">te amo</h1>

        <div class="footer-credits">
            <span class="creator">CREADO POR JOHNSALCHICHON</span>
            <span class="metadata"> ❤ //PARA: BLANCA ALMOALLA</span>
        </div>

    </div>

    <script>
        /* ==========================================
           MOTOR DE PARTÍCULAS CINEMÁTICAS EN 2D/3D
           ========================================== */
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let dataParticles = [];
        let ambientParticles = [];
        let heartScale = 1;
        let beatPhase = 0;

        // Ecuación matemática paramétrica del corazón
        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        function initLayers() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            dataParticles = [];
            ambientParticles = [];

            // 1. Generar el corazón de luz de alta densidad (320 partículas inteligentes)
            const totalHeartParticles = 320;
            for (let i = 0; i < totalHeartParticles; i++) {
                const t = (i / totalHeartParticles) * Math.PI * 2;
                const point = getHeartPoint(t);
                
                dataParticles.push({
                    baseX: point.x,
                    baseY: point.y,
                    x: (Math.random() - 0.5) * canvas.width, // Nacen dispersas en el espacio
                    y: (Math.random() - 0.5) * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.04 + 0.02,
                    noiseX: (Math.random() - 0.5) * 4,
                    noiseY: (Math.random() - 0.5) * 4,
                    alpha: Math.random() * 0.5 + 0.5
                });
            }

            // 2. Generar el polvo ambiental de fondo (45 partículas)
            for (let i = 0; i < 45; i++) {
                ambientParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2 + 0.3,
                    speedY: -(Math.random() * 0.15 + 0.03),
                    opacity: Math.random() * 0.3 + 0.1
                });
            }
        }

        function drawEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            // Ajusta la altura del corazón dinámicamente según el dispositivo
            const centerY = canvas.height / 2 - (window.innerWidth < 768 ? 40 : 60);
            
            // Factor de escala adaptativo para móviles y escritorio
            const responsiveScale = window.innerWidth < 768 ? 7 : 11;

            // Lógica del latido cinemático (Simulación matemática de ritmo cardíaco doble)
            beatPhase += 0.05;
            let beatFactor = Math.sin(beatPhase * 2.5);
            if (beatFactor > 0) {
                heartScale = 1 + (Math.pow(beatFactor, 2) * 0.12);
            } else {
                heartScale = 1 + (beatFactor * 0.02);
            }

            // --- EFECTO INFERIOR: Polvo Atmosférico ---
            ambientParticles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 225, 230, ${p.opacity})`;
                ctx.fill();

                p.y += p.speedY;
                if (p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
            });

            // --- EFECTO CENTRAL: Brillo de fondo del núcleo ---
            let coreGlow = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, heartScale * 120);
            coreGlow.addColorStop(0, 'rgba(255, 51, 68, 0.08)');
            coreGlow.addColorStop(1, 'rgba(5, 5, 8, 0)');
            ctx.fillStyle = coreGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- EFECTO SUPERIOR: Red de Partículas del Corazón ---
            dataParticles.forEach(p => {
                // Posición matemática de destino calculada con el latido
                const targetX = centerX + p.baseX * responsiveScale * heartScale;
                const targetY = centerY + p.baseY * responsiveScale * heartScale;

                // Interpolación fluida (Atracción magnética hacia la forma del corazón)
                p.x += (targetX - p.x) * p.speed;
                p.y += (targetY - p.y) * p.speed;

                // Micro vibración orgánica independiente por partícula
                const currentX = p.x + Math.sin(beatPhase + p.noiseX) * 0.8;
                const currentY = p.y + Math.cos(beatPhase + p.noiseY) * 0.8;

                // Renderizado de la partícula de luz
                ctx.beginPath();
                ctx.arc(currentX, currentY, p.size * (heartScale * 0.95), 0, Math.PI * 2);
                
                // Variación sutil de brillo durante el impacto del latido
                const flash = beatFactor > 0.7 ? 0.3 : 0;
                ctx.fillStyle = `rgba(255, 51, 68, ${Math.min(1, p.alpha + flash)})`;
                ctx.fill();
            });

            requestAnimationFrame(drawEngine);
        }

        // Control de redimensionamiento de pantalla limpio
        window.addEventListener('resize', initLayers);

        // Inicialización y arranque del motor gráfico
        initLayers();
        drawEngine();
    </script>
</body>
</html>
