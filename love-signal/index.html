<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL // LOVE</title>
    
    <link rel="stylesheet" href="../assets/style.css">

    <style>
        /* ==========================================
           CONFIGURACIÓN DE COLORES Y VARIABLES
           ========================================== */
        :root {
            --bg-color: #050508;       
            --text-main: #ffffff;      
            --text-muted: #55556e;     
            --heart-color: #ff3344;    
            --accent-glow: rgba(255, 51, 68, 0.5); 
            --font-family: 'Courier New', Courier, monospace; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #heartCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ==========================================
           CONTENEDOR CENTRAL
           ========================================== */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            pointer-events: none; 
        }

        .heart-spacer {
            height: 160px; 
            width: 100%;
        }

        /* ==========================================
           TEXTO: MÁS GRANDE, CENTRADO Y EFECTO NÚCLEO
           ========================================== */
        .love-message-container {
            margin-top: 120px; 
            display: flex;
            gap: 0.22em;
            opacity: 0;
            animation: fadeInText 3.5s ease-out 1.2s forwards;
        }

        .love-letter {
            font-size: 4.2rem; /* Aumentado considerablemente el tamaño */
            color: #ffffff;
            font-weight: 400;
            text-transform: lowercase;
            display: inline-block;
            position: relative;
            letter-spacing: -0.05em;
            
            /* Efecto de Brillo Puro de Corazón (Neon Rojo Intenso) */
            text-shadow: 
                -2px 2px 10px var(--heart-color), 
                0px 0px 35px var(--accent-glow),
                0px 0px 60px var(--heart-color);

            /* Animación enlazada al ritmo del motor de partículas */
            animation: textHeartSync 2.8s infinite ease-in-out;
        }

        .letter-space {
            width: 0.5em; /* Espacio calibrado entre palabras */
        }

        /* Desfase milimétrico para simular una onda de transmisión */
        .love-letter:nth-child(1) { animation-delay: 0.0s; }
        .love-letter:nth-child(2) { animation-delay: 0.08s; }
        .love-letter:nth-child(4) { animation-delay: 0.16s; }
        .love-letter:nth-child(5) { animation-delay: 0.24s; }
        .love-letter:nth-child(6) { animation-delay: 0.32s; }

        /* ==========================================
           PIE DE PÁGINA
           ========================================== */
        .footer-credits {
            position: absolute;
            bottom: 45px; 
            width: 100%;
            text-align: center;
            opacity: 0;
            animation: fadeInText 3s ease-out 2.5s forwards;
        }

        .creator {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            display: block;
            margin-bottom: 12px;
            text-transform: lowercase;
        }

        .metadata {
            font-size: 0.6rem;
            color: #35354a; 
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        /* ==========================================
           ANIMACIONES
           ========================================== */
        @keyframes fadeInText {
            0% { opacity: 0; filter: blur(6px); transform: translateY(10px); }
            100% { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        /* Sincronización del pulso de luz de las letras con el latido matemático */
        @keyframes textHeartSync {
            0%, 100% {
                transform: scale(0.96);
                color: #ffffff;
                text-shadow: 
                    -2px 2px 10px var(--heart-color), 
                    0px 0px 30px var(--accent-glow),
                    0px 0px 50px var(--heart-color);
            }
            50% {
                transform: scale(1.05); /* Crece al expandirse el corazón */
                color: #fff2f3; /* Destello levemente sonrojado */
                text-shadow: 
                    -3px 3px 20px var(--heart-color), 
                    0px 0px 45px var(--heart-color),
                    0px 0px 80px #ff001e,
                    0px 0px 120px var(--accent-glow);
            }
        }

        @media (max-width: 768px) {
            .love-letter {
                font-size: 3.2rem; /* Escalado ideal para pantallas de móviles */
            }
            .love-message-container {
                margin-top: 90px; 
            }
            .heart-spacer {
                height: 130px;
            }
            .footer-credits {
                bottom: 35px;
            }
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="container">
        
        <div class="heart-spacer"></div>

        <div class="love-message-container">
            <span class="love-letter">t</span>
            <span class="love-letter">e</span>
            <div class="letter-space"></div>
            <span class="love-letter">a</span>
            <span class="love-letter">m</span>
            <span class="love-letter">o</span>
        </div>

        <div class="footer-credits">
            <span class="creator">creado por johnsalchicon</span>
            <span class="metadata">PARA // BLANCA ALMOHALLA ❤</span>
        </div>

    </div>

    <script>
        /* ==========================================
           MOTOR DE PARTÍCULAS CINEMÁTICAS
           ========================================== */
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let dataParticles = [];
        let ambientParticles = [];
        let heartScale = 1;
        let beatPhase = 0;

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
            };
        }

        function initLayers() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            dataParticles = [];
            ambientParticles = [];

            const totalHeartParticles = 350; 
            for (let i = 0; i < totalHeartParticles; i++) {
                const t = (i / totalHeartParticles) * Math.PI * 2;
                const point = getHeartPoint(t);
                
                dataParticles.push({
                    baseX: point.x,
                    baseY: point.y,
                    x: (Math.random() - 0.5) * canvas.width, 
                    y: (Math.random() - 0.5) * canvas.height,
                    size: Math.random() * 1.6 + 0.4,
                    speed: Math.random() * 0.04 + 0.02,
                    noiseX: (Math.random() - 0.5) * 4,
                    noiseY: (Math.random() - 0.5) * 4,
                    alpha: Math.random() * 0.5 + 0.5
                });
            }

            for (let i = 0; i < 45; i++) {
                ambientParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2 + 0.3,
                    speedY: -(Math.random() * 0.15 + 0.03),
                    opacity: Math.random() * 0.3 + 0.1
                });
            }
        }

        function drawEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 - (window.innerWidth < 768 ? 85 : 115);
            const responsiveScale = window.innerWidth < 768 ? 6.5 : 11;

            beatPhase += 0.05;
            let beatFactor = Math.sin(beatPhase * 2.5);
            if (beatFactor > 0) {
                heartScale = 1 + (Math.pow(beatFactor, 2) * 0.12);
            } else {
                heartScale = 1 + (beatFactor * 0.02);
            }

            // Polvo Atmosférico
            ambientParticles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 225, 230, ${p.opacity})`;
                ctx.fill();

                p.y += p.speedY;
                if (p.y < 0) {
                    p.y = canvas.height;
                    p.x = Math.random() * canvas.width;
                }
            });

            // Resplandor del Núcleo
            let coreGlow = ctx.createRadialGradient(centerX, centerY, 5, centerX, centerY, heartScale * 125);
            coreGlow.addColorStop(0, 'rgba(255, 51, 68, 0.09)');
            coreGlow.addColorStop(1, 'rgba(5, 5, 8, 0)');
            ctx.fillStyle = coreGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Red de Partículas
            dataParticles.forEach(p => {
                const targetX = centerX + p.baseX * responsiveScale * heartScale;
                const targetY = centerY + p.baseY * responsiveScale * heartScale;

                p.x += (targetX - p.x) * p.speed;
                p.y += (targetY - p.y) * p.speed;

                const currentX = p.x + Math.sin(beatPhase + p.noiseX) * 0.8;
                const currentY = p.y + Math.cos(beatPhase + p.noiseY) * 0.8;

                ctx.beginPath();
                ctx.arc(currentX, currentY, p.size * (heartScale * 0.95), 0, Math.PI * 2);
                
                const flash = beatFactor > 0.7 ? 0.3 : 0;
                ctx.fillStyle = `rgba(255, 51, 68, ${Math.min(1, p.alpha + flash)})`;
                ctx.fill();
            });

            requestAnimationFrame(drawEngine);
        }

        window.addEventListener('resize', initLayers);
        initLayers();
        drawEngine();
    </script>
</body>
</html>
