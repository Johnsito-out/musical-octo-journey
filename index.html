<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día 0 // Inicio de Transmisión</title>
    
    <link rel="stylesheet" href="assets/style.css">

    <style>
        /* ==========================================
           CONFIGURACIÓN DE COLORES Y VARIABLES
           ========================================== */
        :root {
            --bg-color: #08080c;       
            --text-main: #f0f0f5;      
            --text-muted: #66667e;     
            --accent-glow: rgba(168, 85, 247, 0.4); 
            --font-family: 'Courier New', Courier, monospace; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; 
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.4; 
        }

        /* ==========================================
           CONTENEDOR PRINCIPAL Y ANIMACIONES
           ========================================== */
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            animation: fadeInScreen 3.5s ease-out forwards;
        }

        .narrative-text {
            font-size: 1.1rem;
            color: var(--text-main);
            line-height: 1.8;
            letter-spacing: 0.15em;
            margin-bottom: 60px;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(240, 240, 245, 0.3);
        }

        .countdown-box {
            margin-bottom: 40px; 
        }

        .countdown-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-bottom: 15px;
            display: block;
        }

        .timer {
            font-size: 1.8rem;
            color: var(--text-main);
            letter-spacing: 0.2em;
            font-weight: bold;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        /* Estilo para la dedicatoria */
        .dedication {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.25em;
            text-transform: lowercase; 
            margin-bottom: 10px; /* Reducido para dar espacio al creador */
            display: block;
            text-shadow: 0 0 8px rgba(240, 240, 245, 0.1);
            animation: pulseText 4s infinite ease-in-out;
        }

        /* Estilo para el crédito de creador (johnsalchicon) */
        .creator {
            font-size: 0.65rem;
            color: #44445c; /* Un tono más oscuro y discreto */
            letter-spacing: 0.2em;
            margin-bottom: 60px;
            display: block;
            font-weight: 300;
            animation: pulseText 4s infinite ease-in-out;
            animation-delay: 1s; /* Desfase para que parpadee alternado */
        }

        /* SÍMBOLO RECURRENTE (CORAZÓN) */
        .symbol-container {
            position: absolute;
            bottom: -100px; 
            left: 50%;
            transform: translateX(-50%);
        }

        .symbol {
            font-size: 1.2rem;
            color: var(--text-muted);
            animation: pulseSignal 3s infinite ease-in-out;
            text-shadow: 0 0 8px var(--accent-glow);
        }

        @keyframes fadeInScreen {
            0% { opacity: 0; transform: scale(0.99); filter: blur(3px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes pulseSignal {
            0% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.9; color: var(--text-main); }
            100% { transform: scale(1); opacity: 0.3; }
        }

        @keyframes pulseText {
            0% { opacity: 0.4; }
            50% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        @media (max-width: 768px) {
            .narrative-text {
                font-size: 0.95rem;
                padding: 0 15px;
            }
            .timer {
                font-size: 1.5rem;
            }
            .dedication {
                font-size: 0.75rem;
                letter-spacing: 0.2em;
            }
            .creator {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="ambientCanvas"></canvas>

    <div class="container">
        <p class="narrative-text">
            Todo esto conduce a algo.<br>
            Todavía no necesitas saber a qué.
        </p>

        <div class="countdown-box">
            <span class="countdown-label">next signal in:</span>
            <div id="countdown" class="timer">24:00:00</div>
        </div>

        <span class="dedication">Para Blanca Almohalla</span>
        
        <span class="creator">señal creada por johnsalchichon</span>

        <div class="symbol-container">
            <div class="symbol">❤</div>
        </div>
    </div>

    <script>
        /* ==========================================
           LÓGICA DE LA CUENTA REGRESIVA PERSISTENTE
           ========================================== */
        const COUNTDOWN_DURATION = 24 * 60 * 60 * 1000; 

        function initCountdown() {
            const timerElement = document.getElementById('countdown');
            let startTime = localStorage.getItem('dia0_start_time');

            if (!startTime) {
                startTime = new Date().getTime();
                localStorage.setItem('dia0_start_time', startTime);
            }

            const targetTime = parseInt(startTime, 10) + COUNTDOWN_DURATION;

            function updateTimer() {
                const now = new Date().getTime();
                const distance = targetTime - now;

                if (distance <= 0) {
                    clearInterval(intervalId);
                    timerElement.innerHTML = "00:00:00";
                    timerElement.style.color = "var(--text-muted)";
                    return;
                }

                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                const formattedHours = String(hours).padStart(2, '0');
                const formattedMinutes = String(minutes).padStart(2, '0');
                const formattedSeconds = String(seconds).padStart(2, '0');

                timerElement.innerHTML = `${formattedHours}:${formattedMinutes}:${formattedSeconds}`;
            }

            updateTimer();
            const intervalId = setInterval(updateTimer, 1000);
        }

        /* ==========================================
           EFECTO VISUAL: PARTÍCULAS AMBIENTALES
           ========================================== */
        function initAmbientParticles() {
            const canvas = document.getElementById('ambientCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const particleCount = 40; 
            for(let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2 + 0.3,
                    speedY: -(Math.random() * 0.2 + 0.05), 
                    opacity: Math.random() * 0.5 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(240, 240, 245, ${p.opacity})`;
                    ctx.fill();

                    p.y += p.speedY;

                    if (p.y < 0) {
                        p.y = canvas.height;
                        p.x = Math.random() * canvas.width;
                    }
                });

                requestAnimationFrame(animate);
            }
            animate();
        }

        window.onload = () => {
            initCountdown();
            initAmbientParticles();
        };
    </script>

    <script src="assets/countdown.js"></script>
</body>
</html>
