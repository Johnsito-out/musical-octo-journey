<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John | Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff; color: #1a1a1a; line-height: 1.6; }
        nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: white; z-index: 1000; }
        .logo { font-weight: bold; letter-spacing: 2px; }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { text-decoration: none; color: #1a1a1a; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        nav ul li a:hover { color: #238636; }
        header { padding: 100px 20px; text-align: center; background: #fafafa; }
        header h1 { font-size: 3rem; font-weight: 300; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .project-card { position: relative; overflow: hidden; aspect-ratio: 16/10; cursor: pointer; background: #eee; }
        .project-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .project-card:hover img { transform: scale(1.05); }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; color: white; }
        .project-card:hover .overlay { opacity: 1; }
        footer { padding: 50px; text-align: center; border-top: 1px solid #f0f0f0; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">JOHN / DEV</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="sobre-mi.html">Sobre mí</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>
    <header>
        <h1>Mi Portfolio Creativo</h1>
        <p> Audiovisual & creador de contenido.</p>
    </header>
    <section class="portfolio-grid">
        <div class="project-card" onclick="window.location.href='portfolio.html'">
            <img src="Firefly_GeminiFlash_ahora inspira en una imagen para desarrollo web  359505.png">
            <div class="overlay"><h3>Ver Proyectos</h3><p>Click para explorar</p></div>
        </div>
    </section>
    <footer><p>&copy; 2026 John - musical-octo-journey</p></footer>
</body>
</html>
